<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Score Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6b4a;
    --green-mid: #2a8f63;
    --green-light: #c8ead9;
    --green-pale: #edf7f2;
    --sand: #f5f0e8;
    --ink: #1a1a18;
    --ink-soft: #4a4a45;
    --ink-mute: #8a8a82;
    --line: rgba(26,26,24,0.1);
    --line-strong: rgba(26,26,24,0.18);
    --gold: #c8940a;
    --gold-pale: #fdf6e3;
    --silver: #7a8a96;
    --silver-pale: #f0f3f5;
    --bronze: #9a5c2a;
    --bronze-pale: #faf0e8;
    --r: 10px;
    --r-lg: 16px;
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(42,143,99,0.12) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(26,26,24,0.03) 39px, rgba(26,26,24,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(26,26,24,0.03) 39px, rgba(26,26,24,0.03) 40px);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2.5rem; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 0.5rem; }
  .ball {
    width: 28px; height: 28px; background: #c8e62a; border-radius: 50%;
    position: relative; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.1);
  }
  .ball::after {
    content: ''; position: absolute; top: 50%; left: 10%; right: 10%;
    height: 2px; background: rgba(255,255,255,0.5); border-radius: 2px;
    transform: translateY(-50%) rotate(-15deg);
  }
  h1 { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
  .subtitle { font-size: 11px; color: var(--ink-mute); letter-spacing: 0.08em; text-transform: uppercase; }

  .card { background: #fff; border: 1px solid var(--line-strong); border-radius: var(--r-lg); padding: 1.5rem; margin-bottom: 1rem; }
  .card-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 1rem; }

  /* Setup */
  .count-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .count-btn {
    flex: 1; padding: 10px 0; background: var(--sand); border: 1px solid var(--line-strong);
    border-radius: var(--r); font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--ink-soft); cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .count-btn:hover { border-color: var(--green-mid); color: var(--green); }
  .count-btn.active { background: var(--green-pale); border-color: var(--green-mid); color: var(--green); font-weight: 500; }

  #player-inputs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
  .input-wrap { display: flex; flex-direction: column; gap: 4px; }
  .input-wrap label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-mute); }
  .input-wrap input {
    width: 100%; padding: 8px 10px; font-family: 'DM Mono', monospace; font-size: 13px;
    background: var(--sand); border: 1px solid var(--line-strong); border-radius: var(--r);
    color: var(--ink); outline: none; transition: border-color 0.15s;
  }
  .input-wrap input:focus { border-color: var(--green-mid); }
  .input-wrap input::placeholder { color: var(--ink-mute); }

  .btn-primary {
    width: 100%; padding: 13px; background: var(--green); color: #fff; border: none;
    border-radius: var(--r); font-family: 'DM Mono', monospace; font-size: 13px;
    font-weight: 500; letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-primary:active { transform: scale(0.98); }

  /* Scoreboard */
  #scoreboard { display: none; }
  #scoreboard.active { display: block; }

  /* ── PODIUM ── */
  .podium-wrap {
    background: #fff;
    border: 1px solid var(--line-strong);
    border-radius: var(--r-lg);
    padding: 1.25rem 1rem 0;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .podium-wrap .card-label { margin-bottom: 1.25rem; }

  .podium-stage {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
    height: 200px;
  }

  .podium-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 160px;
  }

  .podium-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 500;
    margin-bottom: 6px;
    border: 2px solid transparent;
    flex-shrink: 0;
  }
  .podium-slot.rank-1 .podium-avatar { background: var(--gold-pale); color: var(--gold); border-color: var(--gold); }
  .podium-slot.rank-2 .podium-avatar { background: var(--silver-pale); color: var(--silver); border-color: var(--silver); }
  .podium-slot.rank-3 .podium-avatar { background: var(--bronze-pale); color: var(--bronze); border-color: var(--bronze); }
  .podium-slot.empty .podium-avatar { background: var(--sand); color: var(--ink-mute); border-color: var(--line-strong); }

  .podium-name {
    font-size: 12px; font-weight: 500; color: var(--ink);
    text-align: center; margin-bottom: 2px;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .podium-pts {
    font-family: 'Fraunces', serif;
    font-size: 15px; font-weight: 600;
    margin-bottom: 8px;
  }
  .podium-slot.rank-1 .podium-pts { color: var(--gold); }
  .podium-slot.rank-2 .podium-pts { color: var(--silver); }
  .podium-slot.rank-3 .podium-pts { color: var(--bronze); }
  .podium-slot.empty .podium-pts { color: var(--ink-mute); }

  .podium-block {
    width: 100%;
    border-radius: 6px 6px 0 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600;
    color: #fff;
  }
  .podium-slot.rank-1 .podium-block { height: 100px; background: var(--gold); }
  .podium-slot.rank-2 .podium-block { height: 72px; background: var(--silver); }
  .podium-slot.rank-3 .podium-block { height: 52px; background: var(--bronze); }
  .podium-slot.empty .podium-block { background: var(--line-strong); color: var(--ink-mute); font-size: 14px; }

  /* ── MATCH CARD ── */
  .match-card { background: #fff; border: 1px solid var(--line-strong); border-radius: var(--r-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .match-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .match-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-mute); }
  .rot-badge { font-size: 10px; color: var(--ink-mute); background: var(--sand); padding: 3px 10px; border-radius: 20px; border: 1px solid var(--line); }

  .teams-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; align-items: stretch; }

  .team-col {
    background: var(--sand); border: 1px solid var(--line-strong); border-radius: var(--r-lg);
    padding: 1rem; text-align: center; transition: background 0.2s, border-color 0.2s;
    display: flex; flex-direction: column; align-items: center;
  }
  .team-col.leader { background: var(--green-pale); border-color: var(--green-mid); }

  .player-chips { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-bottom: 0.75rem; }
  .chip {
    background: #fff; border: 1px solid var(--line-strong); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; font-weight: 500; color: var(--ink);
    width: 100%; text-align: center;
  }
  .leader .chip { background: var(--green-pale); border-color: var(--green-light); color: var(--green); }

  .vs-divider {
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink-mute); font-family: 'Fraunces', serif; font-weight: 300;
  }

  .big-score {
    font-family: 'Fraunces', serif; font-size: 56px; font-weight: 600;
    line-height: 1; color: var(--ink); margin-bottom: 0.75rem; transition: color 0.2s;
  }
  .leader .big-score { color: var(--green); }

  .win-btn {
    width: 100%; padding: 9px 0; background: var(--green); color: #fff; border: none;
    border-radius: var(--r); font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s, transform 0.1s;
    margin-top: auto;
  }
  .win-btn:hover { background: var(--green-mid); }
  .win-btn:active { transform: scale(0.97); }

  /* Next up */
  .next-up {
    background: #fff; border: 1px solid var(--line-strong); border-radius: var(--r);
    padding: 10px 14px; margin-bottom: 1rem; display: flex;
    align-items: center; justify-content: space-between; gap: 8px;
  }
  .next-up-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute); white-space: nowrap; }
  .next-up-teams { font-size: 12px; color: var(--ink-soft); text-align: right; }

  /* Leaderboard (full list below podium) */
  .leaderboard { background: #fff; border: 1px solid var(--line-strong); border-radius: var(--r-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .lb-row { display: grid; grid-template-columns: 24px 1fr 40px 40px 40px; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row.header { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-mute); padding-bottom: 6px; }
  .lb-rank { color: var(--ink-mute); font-size: 12px; }
  .lb-name { color: var(--ink); }
  .lb-pts { font-weight: 500; color: var(--green); text-align: right; }
  .lb-wins { color: var(--ink-soft); text-align: center; font-size: 12px; }
  .lb-losses { color: var(--ink-mute); text-align: center; font-size: 12px; }

  /* History */
  .history-card { background: #fff; border: 1px solid var(--line-strong); border-radius: var(--r-lg); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .match-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
  .match-row { display: grid; grid-template-columns: 52px 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; background: var(--sand); border-radius: var(--r); font-size: 12px; }
  .match-num { color: var(--ink-mute); }
  .match-winner { color: var(--ink); }
  .match-pts { color: var(--green); font-weight: 500; }
  .empty-state { text-align: center; padding: 1.5rem; font-size: 12px; color: var(--ink-mute); }

  .btn-sec {
    width: 100%; padding: 11px; background: transparent; border: 1px solid var(--line-strong);
    border-radius: var(--r); font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--ink-soft); cursor: pointer; letter-spacing: 0.03em; transition: background 0.15s;
  }
  .btn-sec:hover { background: var(--green-pale); border-color: var(--green-light); }

  @media (max-width: 400px) {
    .big-score { font-size: 44px; }
    .chip { font-size: 12px; }
    .podium-name { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <div class="ball"></div>
      <h1>Tennis Tracker</h1>
    </div>
    <p class="subtitle">Doublekamper · Rotasjon</p>
  </header>

  <!-- Setup -->
  <div class="card" id="setup">
    <div class="card-label">Antall spillere</div>
    <div class="count-row">
      <button class="count-btn active" onclick="setCount(4, this)">4 spillere</button>
      <button class="count-btn" onclick="setCount(6, this)">6 spillere</button>
      <button class="count-btn" onclick="setCount(8, this)">8 spillere</button>
    </div>
    <div class="card-label">Spillernavn</div>
    <div id="player-inputs"></div>
    <button class="btn-primary" onclick="startSession()">Start sesjon</button>
  </div>

  <!-- Scoreboard -->
  <div id="scoreboard">

    <!-- Podium -->
    <div class="podium-wrap">
      <div class="card-label">Topp 3</div>
      <div class="podium-stage" id="podium-stage"></div>
    </div>

    <!-- Current match -->
    <div class="match-card">
      <div class="match-meta">
        <span class="match-label" id="match-label">Kamp 1</span>
        <span class="rot-badge" id="rot-badge">Runde 1 · 1/3</span>
      </div>
      <div class="teams-grid">
        <div class="team-col" id="tcol1">
          <div class="player-chips" id="chips1"></div>
          <div class="big-score" id="score1">0</div>
          <button class="win-btn" onclick="recordWin(0)">Vant ↑</button>
        </div>
        <div class="vs-divider">vs</div>
        <div class="team-col" id="tcol2">
          <div class="player-chips" id="chips2"></div>
          <div class="big-score" id="score2">0</div>
          <button class="win-btn" onclick="recordWin(1)">Vant ↑</button>
        </div>
      </div>
    </div>

    <!-- Next up -->
    <div class="next-up">
      <span class="next-up-label">Neste kamp</span>
      <span class="next-up-teams" id="next-up-text"></span>
    </div>

    <!-- Full leaderboard -->
    <div class="leaderboard">
      <div class="card-label">Stillingen</div>
      <div id="lb-body"></div>
    </div>

    <!-- History -->
    <div class="history-card">
      <div class="card-label">Kamphistorikk</div>
      <div class="match-list" id="match-list">
        <div class="empty-state">Ingen kamper spilt ennå</div>
      </div>
    </div>

    <button class="btn-sec" onclick="resetAll()">↺ Tilbakestill alt</button>
  </div>

</div>

<script>
  let playerCount = 4;
  let state = {};

  const ROTATIONS = {
    4: [[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]],
    6: [[[0,1],[2,3]],[[0,2],[4,5]],[[0,3],[1,4]],[[0,4],[2,5]],[[0,5],[1,3]],[[1,2],[3,5]],[[1,5],[2,4]],[[1,3],[4,5]],[[2,3],[0,5]],[[2,4],[0,3]]],
    8: [[[0,1],[2,3]],[[4,5],[6,7]],[[0,2],[4,6]],[[1,3],[5,7]],[[0,3],[5,6]],[[1,2],[4,7]],[[0,4],[3,7]],[[1,5],[2,6]],[[0,5],[3,6]],[[1,4],[2,7]],[[0,6],[1,7]],[[2,4],[3,5]]]
  };

  const MEDALS = ['🥇','🥈','🥉'];
  const RANK_CLASSES = ['rank-1','rank-2','rank-3'];
  const BLOCK_HEIGHTS = [100, 72, 52];
  const BLOCK_LABELS = ['1', '2', '3'];

  function setCount(n, btn) {
    playerCount = n;
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderInputs();
  }

  function renderInputs() {
    const letters = 'ABCDEFGH';
    document.getElementById('player-inputs').innerHTML =
      Array.from({length: playerCount}, (_, i) =>
        `<div class="input-wrap">
          <label>Spiller ${letters[i]}</label>
          <input type="text" id="p${i}" placeholder="Navn" />
        </div>`
      ).join('');
  }

  function pName(idx) { return state.players[idx]; }

  function getPairing(rotIdx) {
    const rots = ROTATIONS[playerCount];
    return rots[rotIdx % rots.length];
  }

  function teamLabel(pair) {
    return pName(pair[0]) + ' & ' + pName(pair[1]);
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function startSession() {
    const letters = 'ABCDEFGH';
    const players = Array.from({length: playerCount}, (_, i) => {
      const v = document.getElementById('p' + i).value.trim();
      return v || 'Spiller ' + letters[i];
    });

    state = {
      players,
      pts: {}, wins: {}, losses: {},
      rotIdx: 0,
      matchNum: 1,
      totalScores: [0, 0],
      history: []
    };
    players.forEach(p => { state.pts[p] = 0; state.wins[p] = 0; state.losses[p] = 0; });

    document.getElementById('setup').style.display = 'none';
    document.getElementById('scoreboard').classList.add('active');
    render();
  }

  function recordWin(team) {
    const pairing = getPairing(state.rotIdx);
    const winPair = pairing[team];
    const losePair = pairing[1 - team];

    state.totalScores[team]++;
    winPair.forEach(pi => { state.pts[pName(pi)]++; state.wins[pName(pi)]++; });
    losePair.forEach(pi => { state.losses[pName(pi)]++; });

    state.history.push({
      match: state.matchNum,
      winnerLabel: teamLabel(winPair)
    });

    state.matchNum++;
    state.rotIdx++;
    render();
  }

  function render() {
    const pairing = getPairing(state.rotIdx);
    const rots = ROTATIONS[playerCount];
    const roundNum = Math.floor(state.rotIdx / rots.length) + 1;
    const posInRound = (state.rotIdx % rots.length) + 1;

    document.getElementById('match-label').textContent = 'Kamp ' + state.matchNum;
    document.getElementById('rot-badge').textContent = 'Runde ' + roundNum + ' · ' + posInRound + '/' + rots.length;

    document.getElementById('score1').textContent = state.totalScores[0];
    document.getElementById('score2').textContent = state.totalScores[1];

    const renderChips = (id, pair) => {
      document.getElementById(id).innerHTML =
        pair.map(pi => `<div class="chip">${pName(pi)}</div>`).join('');
    };
    renderChips('chips1', pairing[0]);
    renderChips('chips2', pairing[1]);

    const [s0, s1] = state.totalScores;
    document.getElementById('tcol1').classList.toggle('leader', s0 > s1);
    document.getElementById('tcol2').classList.toggle('leader', s1 > s0);

    const np = getPairing(state.rotIdx + 1);
    document.getElementById('next-up-text').textContent =
      teamLabel(np[0]) + ' vs ' + teamLabel(np[1]);

    // Sort players
    const sorted = [...state.players].sort((a, b) => state.pts[b] - state.pts[a]);

    // ── Podium ──
    // Order on screen: 2nd (left), 1st (centre), 3rd (right)
    const podiumOrder = [1, 0, 2];
    const podiumRankClass = ['rank-2', 'rank-1', 'rank-3'];

    document.getElementById('podium-stage').innerHTML = podiumOrder.map((rankIdx, colIdx) => {
      const p = sorted[rankIdx];
      const pts = p ? state.pts[p] : 0;
      const isEmpty = !p || pts === 0;
      const rankClass = isEmpty ? 'empty' : podiumRankClass[colIdx];
      const blockH = BLOCK_HEIGHTS[rankIdx];
      const medal = MEDALS[rankIdx];
      const blockLabel = BLOCK_LABELS[rankIdx];

      if (isEmpty) {
        return `<div class="podium-slot empty" style="justify-content: flex-end;">
          <div class="podium-block" style="height:${blockH}px; background: rgba(26,26,24,0.06); color: var(--ink-mute);">${blockLabel}</div>
        </div>`;
      }

      return `<div class="podium-slot ${rankClass}" style="justify-content: flex-end;">
        <div class="podium-avatar">${medal}</div>
        <div class="podium-name">${p}</div>
        <div class="podium-pts">${pts} pkt</div>
        <div class="podium-block" style="height:${blockH}px;">${blockLabel}</div>
      </div>`;
    }).join('');

    // ── Full leaderboard ──
    document.getElementById('lb-body').innerHTML =
      `<div class="lb-row header"><span></span><span>Spiller</span><span style="text-align:center">V</span><span style="text-align:center">T</span><span style="text-align:right">Pkt</span></div>` +
      sorted.map((p, i) =>
        `<div class="lb-row">
          <span class="lb-rank">${i + 1}</span>
          <span class="lb-name">${p}</span>
          <span class="lb-wins">${state.wins[p]}</span>
          <span class="lb-losses">${state.losses[p]}</span>
          <span class="lb-pts">${state.pts[p]}</span>
        </div>`
      ).join('');

    // ── History ──
    const list = document.getElementById('match-list');
    if (!state.history.length) {
      list.innerHTML = '<div class="empty-state">Ingen kamper spilt ennå</div>';
    } else {
      list.innerHTML = state.history.slice().reverse().map(h =>
        `<div class="match-row">
          <span class="match-num">Kamp ${h.match}</span>
          <span class="match-winner">${h.winnerLabel}</span>
          <span class="match-pts">+1</span>
        </div>`
      ).join('');
    }
  }

  function resetAll() {
    state = {};
    document.getElementById('setup').style.display = 'block';
    document.getElementById('scoreboard').classList.remove('active');
    renderInputs();
  }

  renderInputs();
</script>
</body>
</html>
